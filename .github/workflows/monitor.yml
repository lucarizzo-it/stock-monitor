name: Monitor MSFT

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
    - name: Get MSFT price (Yahoo stable endpoint)
        run: |
          curl -s \
          "https://query2.finance.yahoo.com/v8/finance/chart/MSFT" > data.json

      - name: Show result
        run: cat data.json
