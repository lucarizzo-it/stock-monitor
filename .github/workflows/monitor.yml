name: Monitor Stocks

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get prices from Yahoo
        run: |
          curl -s \
            -H "User-Agent: Mozilla/5.0" \
            "https://query2.finance.yahoo.com/v8/finance/chart/U308.DE" > U308.json

          curl -s \
            -H "User-Agent: Mozilla/5.0" \
            "https://query2.finance.yahoo.com/v8/finance/chart/XDWT.DE" > XDWT.json

          curl -s \
            -H "User-Agent: Mozilla/5.0" \
            "https://query2.finance.yahoo.com/v8/finance/chart/ASWG.DE" > ASWG.json

          curl -s \
            -H "User-Agent: Mozilla/5.0" \
            "https://query2.finance.yahoo.com/v8/finance/chart/EXUS.DE" > EXUS.json

      - name: Extract prices and save CSV
        run: |
          DATE=$(date +%Y-%m-%d)

          P1=$(jq -r '.chart.result[0].meta.regularMarketPrice' U308.json)
          P2=$(jq -r '.chart.result[0].meta.regularMarketPrice' XDWT.json)
          P3=$(jq -r '.chart.result[0].meta.regularMarketPrice' ASWG.json)
          P4=$(jq -r '.chart.result[0].meta.regularMarketPrice' EXUS.json)

          echo "$DATE,U308.DE,$P1" >> data.csv
          echo "$DATE,XDWT.DE,$P2" >> data.csv
          echo "$DATE,ASWG.DE,$P3" >> data.csv
          echo "$DATE,EXUS.DE,$P4" >> data.csv

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.csv
          git commit -m "update stock data" || echo "no changes"
          git push

      - name: Show result
        run: cat data.csv
